<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatClex Admin | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.03)',
                        glassBorder: 'rgba(255, 255, 255, 0.08)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            background-color: #0f111a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: slideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased selection:bg-indigo-500/30">

    <div id="app" class="flex-grow flex flex-col relative z-10"></div>
    
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_kK3OVsj9AkIS3cDzEMeRXDvXlcRG9L8",
            authDomain: "catclex.firebaseapp.com",
            projectId: "catclex",
            storageBucket: "catclex.firebasestorage.app",
            messagingSenderId: "966297687447",
            appId: "1:966297687447:web:189a306f23375c8a68a0d2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================
        // CONFIGURATION - Toggle features here
        // ============================================
        const CONFIG = {
            ENABLE_ACCOUNT_VERIFICATION: false,  // Set to true to re-enable account verification
            ENABLE_CREDIT_REQUESTS: true         // Credit request system
        };

        window.AdminState = {
            view: 'loading',
            user: null,
            usersList: [],
            creditRequests: [],
            engineConfig: { apikey: '', slugs: '' },
            stats: { total: 0, pending: 0, pendingCredits: 0 }
        };

        // --- TOAST NOTIFICATIONS ---
        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            const colorClass = type === 'success' ? 'text-emerald-400 border-emerald-500/30' : 'text-rose-400 border-rose-500/30';
            
            toast.className = `glass-panel border-l-4 ${colorClass} px-4 py-3 rounded-r-lg shadow-lg flex items-center gap-3 toast-enter min-w-[250px]`;
            toast.innerHTML = `
                <i data-feather="${icon}" class="w-5 h-5"></i>
                <span class="text-sm font-medium text-white">${message}</span>
            `;
            
            container.appendChild(toast);
            feather.replace();

            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const adminConfigSnap = await getDoc(doc(db, 'engine', 'adminConfig'));
                    let allowedEmail = 'cashton858@gmail.com'; 
                    
                    if (adminConfigSnap.exists() && adminConfigSnap.data().adminEmail) {
                        allowedEmail = adminConfigSnap.data().adminEmail;
                    }

                    if (user.email !== allowedEmail) {
                        await signOut(auth);
                        window.AdminState.user = null;
                        window.AdminState.view = 'login';
                        window.renderApp();
                        return;
                    }

                    window.AdminState.user = user;
                    window.AdminState.view = 'dashboard';
                    await loadAdminData();
                } catch (e) {
                    console.error("Auth check error:", e);
                    await signOut(auth);
                    window.AdminState.user = null;
                    window.AdminState.view = 'login';
                    window.renderApp();
                }
            } else {
                window.AdminState.user = null;
                window.AdminState.view = 'login';
                window.renderApp();
            }
        });

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            const btn = document.getElementById('login-btn');
            
            btn.innerHTML = '<i data-feather="loader" class="w-5 h-5 spinner mx-auto"></i>';
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                window.showToast("Invalid credentials or unauthorized access.", "error");
                btn.innerHTML = 'Access Portal';
                btn.disabled = false;
            }
        };

        window.logout = async () => {
            await signOut(auth);
        };

        // --- DATA FETCHING ---
        async function loadAdminData() {
            try {
                // Fetch Users
                const usersSnap = await getDocs(query(collection(db, 'users'), orderBy('createdAt', 'desc')));
                const users = [];
                let pendingCount = 0;
                let pendingCreditRequests = 0;

                usersSnap.forEach(doc => {
                    const data = doc.data();
                    if(data.createdAt && data.createdAt.toDate) data.createdAt = data.createdAt.toDate();
                    
                    // Count pending credit requests
                    if (data.requests && Array.isArray(data.requests)) {
                        data.requests.forEach(req => {
                            if (req.status === 'pending') {
                                pendingCreditRequests++;
                            }
                        });
                    }
                    
                    users.push({ uid: doc.id, ...data });
                    if(data.verified === false) pendingCount++;
                });

                window.AdminState.usersList = users;
                window.AdminState.stats.total = users.length;
                window.AdminState.stats.pending = pendingCount;
                window.AdminState.stats.pendingCredits = pendingCreditRequests;

                // Fetch Engine Config
                const apikeySnap = await getDoc(doc(db, 'engine', 'apikey'));
                const slugsSnap = await getDoc(doc(db, 'engine', 'slugs'));
                
                if (apikeySnap.exists()) window.AdminState.engineConfig.apikey = apikeySnap.data().apikey || apikeySnap.data().string || '';
                if (slugsSnap.exists()) window.AdminState.engineConfig.slugs = slugsSnap.data().slugs || slugsSnap.data().string || '';

                window.renderApp();
            } catch (error) {
                console.error("Error loading data:", error);
                window.showToast("Failed to load database data. Check permissions.", "error");
            }
        }

        // --- ADMIN ACTIONS ---

        // Account Verification (Disabled but can be re-enabled)
        window.toggleVerification = async (uid, currentStatus) => {
            if (!CONFIG.ENABLE_ACCOUNT_VERIFICATION) {
                window.showToast("Account verification is currently disabled.", "error");
                return;
            }
            
            try {
                const newStatus = !currentStatus;
                await updateDoc(doc(db, 'users', uid), { verified: newStatus });
                
                const userIndex = window.AdminState.usersList.findIndex(u => u.uid === uid);
                if(userIndex > -1) {
                    window.AdminState.usersList[userIndex].verified = newStatus;
                    window.AdminState.stats.pending += newStatus ? -1 : 1;
                }
                
                window.showToast(`User ${newStatus ? 'Approved' : 'Revoked'} successfully!`);
                window.renderApp();
            } catch (err) {
                window.showToast("Failed to update user.", "error");
            }
        };

        // Credit Request Actions
        window.approveCreditRequest = async (userId, requestId, amount) => {
            try {
                const userRef = doc(db, 'users', userId);
                const userDoc = await getDoc(userRef);
                
                if (!userDoc.exists()) {
                    window.showToast("User not found.", "error");
                    return;
                }

                const userData = userDoc.data();
                const requests = userData.requests || [];
                
                // Update the request status
                const updatedRequests = requests.map(req => {
                    if (req.id === requestId) {
                        return { ...req, status: 'approved', updatedAt: new Date().toISOString() };
                    }
                    return req;
                });

                // Add credits to user's balance
                const currentCredits = userData.credits || 0;
                const newCredits = currentCredits + parseInt(amount);

                // Update user document
                await updateDoc(userRef, {
                    credits: newCredits,
                    requests: updatedRequests
                });

                // Update local state
                const userIndex = window.AdminState.usersList.findIndex(u => u.uid === userId);
                if (userIndex > -1) {
                    window.AdminState.usersList[userIndex].credits = newCredits;
                    window.AdminState.usersList[userIndex].requests = updatedRequests;
                    window.AdminState.stats.pendingCredits--;
                }

                window.showToast(`Approved ${amount} credits for user!`);
                window.renderApp();
            } catch (err) {
                console.error("Error approving credit request:", err);
                window.showToast("Failed to approve credit request.", "error");
            }
        };

        window.denyCreditRequest = async (userId, requestId) => {
            try {
                const userRef = doc(db, 'users', userId);
                const userDoc = await getDoc(userRef);
                
                if (!userDoc.exists()) {
                    window.showToast("User not found.", "error");
                    return;
                }

                const userData = userDoc.data();
                const requests = userData.requests || [];
                
                // Update the request status
                const updatedRequests = requests.map(req => {
                    if (req.id === requestId) {
                        return { ...req, status: 'denied', updatedAt: new Date().toISOString() };
                    }
                    return req;
                });

                // Update user document
                await updateDoc(userRef, {
                    requests: updatedRequests
                });

                // Update local state
                const userIndex = window.AdminState.usersList.findIndex(u => u.uid === userId);
                if (userIndex > -1) {
                    window.AdminState.usersList[userIndex].requests = updatedRequests;
                    window.AdminState.stats.pendingCredits--;
                }

                window.showToast("Credit request denied.");
                window.renderApp();
            } catch (err) {
                console.error("Error denying credit request:", err);
                window.showToast("Failed to deny credit request.", "error");
            }
        };

        // Manual Credit Adjustment
        window.adjustCredits = async (userId, amount) => {
            try {
                const userRef = doc(db, 'users', userId);
                const userDoc = await getDoc(userRef);
                
                if (!userDoc.exists()) {
                    window.showToast("User not found.", "error");
                    return;
                }

                const userData = userDoc.data();
                const currentCredits = userData.credits || 0;
                const newCredits = currentCredits + parseInt(amount);

                await updateDoc(userRef, {
                    credits: newCredits
                });

                // Update local state
                const userIndex = window.AdminState.usersList.findIndex(u => u.uid === userId);
                if (userIndex > -1) {
                    window.AdminState.usersList[userIndex].credits = newCredits;
                }

                window.showToast(`Adjusted credits by ${amount > 0 ? '+' : ''}${amount} for user!`);
                window.renderApp();
            } catch (err) {
                console.error("Error adjusting credits:", err);
                window.showToast("Failed to adjust credits.", "error");
            }
        };

        window.saveEngineConfig = async () => {
            const btn = document.getElementById('save-config-btn');
            btn.innerHTML = '<i data-feather="loader" class="w-4 h-4 spinner"></i> Saving...';
            
            const newKey = document.getElementById('config-apikey').value;
            const newSlugs = document.getElementById('config-slugs').value;

            try {
                await setDoc(doc(db, 'engine', 'apikey'), { apikey: newKey, string: newKey });
                await setDoc(doc(db, 'engine', 'slugs'), { slugs: newSlugs, string: newSlugs });
                
                window.AdminState.engineConfig.apikey = newKey;
                window.AdminState.engineConfig.slugs = newSlugs;
                
                window.showToast("Engine Configuration Updated!");
            } catch (err) {
                window.showToast("Failed to save configuration.", "error");
            } finally {
                btn.innerHTML = '<i data-feather="save" class="w-4 h-4"></i> Save Configuration';
                feather.replace();
            }
        };

        // --- RENDERING VIEWS ---
        function renderLoading() {
            return `
            <div class="flex-grow flex flex-col items-center justify-center animate-fade-in">
                <div class="relative w-20 h-20">
                    <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-indigo-500 border-t-transparent rounded-full spinner"></div>
                </div>
                <h2 class="mt-6 text-xl font-medium text-slate-300 tracking-widest uppercase text-sm">Establishing Secure Connection</h2>
            </div>`;
        }

        function renderLogin() {
            return `
            <div class="flex-grow flex items-center justify-center p-4 animate-fade-in">
                <div class="glass-panel p-8 rounded-2xl w-full max-w-md relative overflow-hidden">
                    <div class="absolute -top-20 -right-20 w-40 h-40 bg-indigo-500 rounded-full mix-blend-screen filter blur-[60px] opacity-20"></div>
                    <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-fuchsia-500 rounded-full mix-blend-screen filter blur-[60px] opacity-20"></div>
                    
                    <div class="relative z-10">
                        <div class="flex justify-center mb-6">
                            <div class="bg-indigo-500/10 p-4 rounded-full border border-indigo-500/20">
                                <i data-feather="shield" class="w-8 h-8 text-indigo-400"></i>
                            </div>
                        </div>
                        <h2 class="text-2xl font-bold text-center text-white mb-2">CatClex Nexus</h2>
                        <p class="text-center text-slate-400 text-sm mb-8">Admin Access Terminal</p>

                        <form onsubmit="handleLogin(event)" class="space-y-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">Admin Email</label>
                                <input type="email" id="admin-email" required class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">Passphrase</label>
                                <input type="password" id="admin-pass" required class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                            </div>
                            
                            <button id="login-btn" type="submit" class="w-full bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-400 hover:to-violet-500 text-white font-bold py-3 rounded-lg shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-all mt-4">
                                Access Portal
                            </button>
                        </form>
                    </div>
                </div>
            </div>`;
        }

        function renderDashboard() {
            const s = window.AdminState;

            // Generate User Table Rows
            const userRows = s.usersList.map(u => {
                const credits = u.credits || 0;
                const requests = u.requests || [];
                const pendingRequests = requests.filter(r => r.status === 'pending').length;
                
                // Verification status (disabled but shown for reference)
                const isVerified = u.verified;
                let statusBadge;
                if (CONFIG.ENABLE_ACCOUNT_VERIFICATION) {
                    statusBadge = isVerified 
                        ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20"><i data-feather="check-circle" class="w-3 h-3"></i> Approved</span>`
                        : `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-amber-500/10 text-amber-400 border border-amber-500/20"><i data-feather="clock" class="w-3 h-3"></i> Pending</span>`;
                } else {
                    statusBadge = `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-slate-500/10 text-slate-400 border border-slate-500/20"><i data-feather="minus-circle" class="w-3 h-3"></i> N/A</span>`;
                }

                // Action buttons
                let actionButtons = '';
                if (CONFIG.ENABLE_ACCOUNT_VERIFICATION) {
                    const verifyBtn = isVerified
                        ? `<button onclick="toggleVerification('${u.uid}', true)" class="px-3 py-1.5 bg-slate-800 hover:bg-rose-500/20 text-slate-300 hover:text-rose-400 border border-slate-700 hover:border-rose-500/30 rounded-md text-xs font-medium transition-colors">Revoke</button>`
                        : `<button onclick="toggleVerification('${u.uid}', false)" class="px-3 py-1.5 bg-indigo-500 hover:bg-indigo-400 text-white shadow-[0_0_10px_rgba(99,102,241,0.3)] rounded-md text-xs font-medium transition-all">Approve</button>`;
                    actionButtons += verifyBtn;
                }

                const dateStr = u.createdAt ? u.createdAt.toLocaleDateString() : 'Unknown';

                return `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-colors group">
                    <td class="py-4 px-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-slate-700 to-slate-600 flex items-center justify-center text-xs font-bold text-white shadow-inner">
                                ${u.email.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <span class="text-sm font-medium text-slate-200">${u.email}</span>
                                ${pendingRequests > 0 ? `<span class="ml-2 inline-flex items-center justify-center w-5 h-5 rounded-full bg-amber-500 text-[10px] font-bold text-white">${pendingRequests}</span>` : ''}
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4">
                        <div class="flex items-center gap-1.5">
                            <i data-feather="coins" class="w-4 h-4 text-amber-400"></i>
                            <span class="text-sm font-medium text-amber-400">${credits}</span>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-sm text-slate-400">${dateStr}</td>
                    <td class="py-4 px-4">${statusBadge}</td>
                    <td class="py-4 px-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            ${actionButtons}
                            <button onclick="openCreditModal('${u.uid}', '${u.email}', ${credits})" class="px-3 py-1.5 bg-amber-500/20 hover:bg-amber-500/30 text-amber-400 border border-amber-500/30 rounded-md text-xs font-medium transition-colors">
                                <i data-feather="plus-circle" class="w-3 h-3 inline mr-1"></i>Credits
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            // Generate Credit Requests Section
            let creditRequestsHtml = '';
            if (CONFIG.ENABLE_CREDIT_REQUESTS) {
                const allPendingRequests = [];
                s.usersList.forEach(user => {
                    const requests = user.requests || [];
                    requests.forEach(req => {
                        if (req.status === 'pending') {
                            allPendingRequests.push({
                                ...req,
                                userId: user.uid,
                                userEmail: user.email
                            });
                        }
                    });
                });

                if (allPendingRequests.length > 0) {
                    const requestRows = allPendingRequests.map(req => {
                        const dateStr = req.createdAt ? new Date(req.createdAt).toLocaleDateString() : 'Unknown';
                        return `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                            <td class="py-3 px-4">
                                <div class="flex items-center gap-2">
                                    <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-slate-700 to-slate-600 flex items-center justify-center text-[10px] font-bold text-white">
                                        ${req.userEmail.charAt(0).toUpperCase()}
                                    </div>
                                    <span class="text-sm text-slate-300">${req.userEmail}</span>
                                </div>
                            </td>
                            <td class="py-3 px-4">
                                <span class="text-sm font-medium text-amber-400">+${req.amount} credits</span>
                            </td>
                            <td class="py-3 px-4 text-sm text-slate-400 max-w-xs truncate" title="${req.reason}">${req.reason}</td>
                            <td class="py-3 px-4 text-sm text-slate-500">${dateStr}</td>
                            <td class="py-3 px-4 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <button onclick="approveCreditRequest('${req.userId}', '${req.id}', ${req.amount})" class="px-3 py-1.5 bg-emerald-500/20 hover:bg-emerald-500/30 text-emerald-400 border border-emerald-500/30 rounded-md text-xs font-medium transition-colors">
                                        <i data-feather="check" class="w-3 h-3 inline mr-1"></i>Approve
                                    </button>
                                    <button onclick="denyCreditRequest('${req.userId}', '${req.id}')" class="px-3 py-1.5 bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 border border-rose-500/30 rounded-md text-xs font-medium transition-colors">
                                        <i data-feather="x" class="w-3 h-3 inline mr-1"></i>Deny
                                    </button>
                                </div>
                            </td>
                        </tr>`;
                    }).join('');

                    creditRequestsHtml = `
                    <div class="glass-panel rounded-2xl overflow-hidden">
                        <div class="px-6 py-4 border-b border-white/10 flex justify-between items-center bg-amber-500/10">
                            <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                <i data-feather="bell" class="w-5 h-5 text-amber-400"></i>
                                Pending Credit Requests
                                <span class="ml-2 inline-flex items-center justify-center px-2 py-0.5 rounded-full bg-amber-500 text-xs font-bold text-white">${allPendingRequests.length}</span>
                            </h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-900/50">
                                    <tr>
                                        <th class="py-2 px-4 text-xs font-semibold text-slate-400 uppercase">User</th>
                                        <th class="py-2 px-4 text-xs font-semibold text-slate-400 uppercase">Amount</th>
                                        <th class="py-2 px-4 text-xs font-semibold text-slate-400 uppercase">Reason</th>
                                        <th class="py-2 px-4 text-xs font-semibold text-slate-400 uppercase">Date</th>
                                        <th class="py-2 px-4 text-xs font-semibold text-slate-400 uppercase text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>${requestRows}</tbody>
                            </table>
                        </div>
                    </div>`;
                } else {
                    creditRequestsHtml = `
                    <div class="glass-panel rounded-2xl p-8 text-center">
                        <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i data-feather="check-circle" class="w-6 h-6 text-emerald-400"></i>
                        </div>
                        <h3 class="text-lg font-medium text-white mb-1">All Caught Up!</h3>
                        <p class="text-sm text-slate-400">No pending credit requests at this time.</p>
                    </div>`;
                }
            }

            return `
            <!-- Top Navigation -->
            <nav class="glass-panel border-b-0 border-x-0 sticky top-0 z-40">
                <div class="max-w-7xl mx-auto px-4 md:px-6 h-14 md:h-16 flex items-center justify-between">
                    <div class="flex items-center gap-2 md:gap-3">
                        <div class="bg-indigo-500/20 p-1.5 md:p-2 rounded-lg border border-indigo-500/30">
                            <i data-feather="activity" class="w-4 h-4 md:w-5 md:h-5 text-indigo-400"></i>
                        </div>
                        <span class="text-base md:text-lg font-bold text-white tracking-wide">CatClex <span class="font-light text-slate-400">Nexus</span></span>
                    </div>
                    <button onclick="logout()" class="flex items-center gap-2 text-xs md:text-sm font-medium text-slate-400 hover:text-white transition-colors">
                        <i data-feather="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Disconnect</span>
                    </button>
                </div>
            </nav>

            <main class="flex-grow max-w-7xl mx-auto w-full px-4 md:px-6 py-6 md:py-8 animate-fade-in space-y-6 md:space-y-8">
                
                <!-- Stats Overview -->
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4">
                    <div class="glass-panel p-4 md:p-6 rounded-2xl relative overflow-hidden group">
                        <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"><i data-feather="users" class="w-12 h-12 md:w-16 md:h-16"></i></div>
                        <h3 class="text-xs md:text-sm font-medium text-slate-400 uppercase tracking-wider mb-1 md:mb-2">Total Users</h3>
                        <div class="text-2xl md:text-4xl font-bold text-white">${s.stats.total}</div>
                    </div>
                    <div class="glass-panel p-4 md:p-6 rounded-2xl relative overflow-hidden group">
                        <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"><i data-feather="coins" class="w-12 h-12 md:w-16 md:h-16 text-amber-500"></i></div>
                        <h3 class="text-xs md:text-sm font-medium text-slate-400 uppercase tracking-wider mb-1 md:mb-2">Pending Credits</h3>
                        <div class="text-2xl md:text-4xl font-bold ${s.stats.pendingCredits > 0 ? 'text-amber-400' : 'text-emerald-400'}">${s.stats.pendingCredits}</div>
                    </div>
                    <div class="glass-panel p-4 md:p-6 rounded-2xl relative overflow-hidden group col-span-2 md:col-span-1">
                        <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity"><i data-feather="settings" class="w-12 h-12 md:w-16 md:h-16 text-fuchsia-500"></i></div>
                        <h3 class="text-xs md:text-sm font-medium text-slate-400 uppercase tracking-wider mb-1 md:mb-2">Engine Status</h3>
                        <div class="text-2xl md:text-4xl font-bold text-emerald-400">Online</div>
                    </div>
                </div>

                ${creditRequestsHtml}

                <!-- User Management Table -->
                <div class="glass-panel rounded-2xl overflow-hidden flex flex-col">
                    <div class="px-4 md:px-6 py-4 md:py-5 border-b border-white/10 flex justify-between items-center bg-white/[0.02]">
                        <h2 class="text-base md:text-lg font-bold text-white flex items-center gap-2"><i data-feather="users" class="w-4 h-4 md:w-5 md:h-5 text-indigo-400"></i> User Management</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-900/50 sticky top-0 z-10 backdrop-blur-md">
                                <tr>
                                    <th class="py-2 md:py-3 px-3 md:px-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">User</th>
                                    <th class="py-2 md:py-3 px-3 md:px-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Credits</th>
                                    <th class="py-2 md:py-3 px-3 md:px-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Joined</th>
                                    <th class="py-2 md:py-3 px-3 md:px-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Status</th>
                                    <th class="py-2 md:py-3 px-3 md:px-4 text-xs font-semibold text-slate-400 uppercase tracking-wider text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${userRows.length > 0 ? userRows : `<tr><td colspan="5" class="py-8 text-center text-slate-500 italic">No users found in database.</td></tr>`}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Engine Config -->
                <div class="glass-panel rounded-2xl p-4 md:p-6 relative overflow-hidden">
                    <div class="absolute -top-20 -right-20 w-40 h-40 bg-fuchsia-500 rounded-full mix-blend-screen filter blur-[80px] opacity-10"></div>
                    
                    <h2 class="text-base md:text-lg font-bold text-white mb-4 md:mb-6 flex items-center gap-2 border-b border-white/10 pb-4">
                        <i data-feather="cpu" class="w-4 h-4 md:w-5 md:h-5 text-fuchsia-400"></i> Engine Architecture
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">OpenRouter API Key</label>
                            <div class="relative">
                                <i data-feather="key" class="absolute left-3 top-3 w-4 h-4 text-slate-500"></i>
                                <input type="password" id="config-apikey" value="${s.engineConfig.apikey}" class="w-full bg-slate-900/60 border border-slate-700 rounded-lg pl-10 pr-4 py-2.5 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-fuchsia-500/50 focus:ring-1 focus:ring-fuchsia-500/50 transition-all font-mono">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">AI Model Fallback Chain</label>
                            <div class="relative">
                                <i data-feather="server" class="absolute left-3 top-3 w-4 h-4 text-slate-500"></i>
                                <textarea id="config-slugs" rows="3" class="w-full bg-slate-900/60 border border-slate-700 rounded-lg pl-10 pr-4 py-2.5 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-fuchsia-500/50 focus:ring-1 focus:ring-fuchsia-500/50 transition-all font-mono leading-relaxed resize-none">${s.engineConfig.slugs}</textarea>
                            </div>
                        </div>
                    </div>

                    <button id="save-config-btn" onclick="saveEngineConfig()" class="mt-4 md:mt-6 w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-medium py-2.5 rounded-lg transition-all flex items-center justify-center gap-2 text-sm">
                        <i data-feather="save" class="w-4 h-4"></i> Save Configuration
                    </button>
                </div>

            </main>
            `;
        }

        // --- CREDIT MODAL ---
        window.openCreditModal = (userId, userEmail, currentCredits) => {
            const modal = document.createElement('div');
            modal.id = 'credit-modal';
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4';
            modal.innerHTML = `
                <div class="glass-panel rounded-2xl p-6 w-full max-w-md animate-fade-in">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-lg font-bold text-white">Adjust Credits</h3>
                        <button onclick="closeCreditModal()" class="text-slate-400 hover:text-white transition">
                            <i data-feather="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="bg-slate-800/50 rounded-lg p-4 mb-6">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-sm font-bold text-white">
                                ${userEmail.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="text-sm font-medium text-white">${userEmail}</p>
                                <p class="text-xs text-slate-400">Current: <span class="text-amber-400 font-medium">${currentCredits} credits</span></p>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Adjustment Amount</label>
                            <input type="number" id="credit-adjustment" placeholder="e.g. 100 or -50" class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all">
                            <p class="text-xs text-slate-500 mt-1">Use positive numbers to add credits, negative to remove.</p>
                        </div>

                        <div class="flex gap-3">
                            <button onclick="closeCreditModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-medium py-2.5 rounded-lg transition">
                                Cancel
                            </button>
                            <button onclick="submitCreditAdjustment('${userId}')" class="flex-1 bg-amber-500 hover:bg-amber-400 text-white font-medium py-2.5 rounded-lg transition">
                                Apply Adjustment
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            feather.replace();
        };

        window.closeCreditModal = () => {
            const modal = document.getElementById('credit-modal');
            if (modal) modal.remove();
        };

        window.submitCreditAdjustment = async (userId) => {
            const input = document.getElementById('credit-adjustment');
            const amount = parseInt(input.value);
            
            if (isNaN(amount) || amount === 0) {
                window.showToast("Please enter a valid amount.", "error");
                return;
            }

            await window.adjustCredits(userId, amount);
            closeCreditModal();
        };

        // Close modal on outside click
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('credit-modal');
            if (modal && e.target === modal) {
                closeCreditModal();
            }
        });

        window.renderApp = () => {
            const appDiv = document.getElementById('app');
            if (window.AdminState.view === 'loading') appDiv.innerHTML = renderLoading();
            else if (window.AdminState.view === 'login') appDiv.innerHTML = renderLogin();
            else if (window.AdminState.view === 'dashboard') appDiv.innerHTML = renderDashboard();
            feather.replace();
        };

        window.onload = window.renderApp;
    </script>
</body>
</html>
